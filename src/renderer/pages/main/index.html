<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Electron Tools - 现代化的桌面工具应用">
    <title>Electron Tools</title>
    <link rel="stylesheet" href="../../styles/main.css">
</head>
<body>
    <div id="app">
        <header class="title-bar">
            <div class="title">🛠️ Electron Tools</div>
            <div class="window-controls">
                <button class="btn-minimize" title="最小化">−</button>
                <button class="btn-maximize" title="最大化">□</button>
                <button class="btn-close" title="关闭">×</button>
            </div>
        </header>

        <div class="app-content">
            <aside class="sidebar">
                <nav>
                    <ul>
                        <li><a href="#dashboard" class="nav-link active">📊 仪表盘</a></li>
                        <li><a href="#tools" class="nav-link">🛠️ 工具箱</a></li>
                        <li><a href="#files" class="nav-link">📁 文件管理</a></li>
                        <li><a href="#settings" class="nav-link">⚙️ 设置</a></li>
                    </ul>
                </nav>
            </aside>

            <main class="main-content">
                <div id="dashboard" class="page active">
                    <h1>欢迎使用 Electron Tools</h1>
                    <p>这是一个现代化的Electron桌面应用，提供丰富的工具集。</p>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>应用版本</h3>
                            <p id="app-version">加载中...</p>
                        </div>
                        <div class="stat-card">
                            <h3>系统平台</h3>
                            <p id="system-platform">加载中...</p>
                        </div>
                        <div class="stat-card">
                            <h3>运行时间</h3>
                            <p id="uptime">加载中...</p>
                        </div>
                    </div>
                </div>

                <div id="tools" class="page">
                    <h1>工具箱</h1>
                    <div class="tools-grid">
                        <div class="tool-card">
                            <h3>文件转换器</h3>
                            <p>转换各种文件格式</p>
                            <button class="btn-primary">开始使用</button>
                        </div>
                        <div class="tool-card">
                            <h3>文本编辑器</h3>
                            <p>强大的文本编辑功能</p>
                            <button class="btn-primary">开始使用</button>
                        </div>
                    </div>
                </div>

                <div id="files" class="page">
                    <h1>文件管理</h1>
                    <div class="file-manager">
                        <button id="select-file" class="btn-primary">选择文件</button>
                        <div id="file-content" class="file-content"></div>
                    </div>
                </div>

                <div id="settings" class="page">
                    <h1>设置</h1>
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label>主题:</label>
                            <select id="theme-select">
                                <option value="light">浅色</option>
                                <option value="dark">深色</option>
                            </select>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../scripts/main.js"></script>
</body>
</html>
